# Сборка и проверки Go-сервера gen
name: Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version/tag for build'
        required: true
        type: string

jobs:
  test-and-build:
    name: Test and build (linux/amd64)
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify and test
        run: |
          go mod verify
          go test ./...

      - name: Build server binary
        run: |
          go build -trimpath -ldflags "-s -w" -o gen ./cmd/gen

      - uses: actions/upload-artifact@v4
        with:
          name: gen-linux-amd64
          path: gen
