# Сборка при push в main и обновление тега dev-build
name: CI

#on:
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]
#  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event_name == 'push' && 'dev-build' || (github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)) || 'dev-build' }}
    secrets: inherit

  update-dev-build-tag:
    name: Update dev-build tag
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete and recreate dev-build tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d dev-build 2>/dev/null || true
          git push origin :refs/tags/dev-build 2>/dev/null || true
          git tag dev-build
          git push origin dev-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dev-release:
    name: Upload Dev-Build Release
    needs: [build, update-dev-build-tag]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: gen-linux-amd64
          path: artifacts/gen-linux-amd64

      - name: Prepare dev-build binary
        run: |
          cp artifacts/gen-linux-amd64/gen ./gen-linux-amd64-dev-build

      - name: Upload Dev-Build Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: "Dev build"
          draft: false
          prerelease: true
          files: gen-linux-amd64-dev-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
